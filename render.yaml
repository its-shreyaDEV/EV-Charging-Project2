services:
  - type: web
    name: ev-charge-finder
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: OPENCAGE_API_KEY
        sync: false                # You set this manually in Render dashboard
